<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HATOYA - Matcha Basics Quiz</title>
  <style>
    /* --------------------------------------------------
     * Global Variables & Reset CSS
     * -------------------------------------------------- */
    :root {
      --primary-color: #2e563f;       /* Deep Tea Green */
      --primary-light: #f1f5f2;       /* Very light green-tinted background */
      --secondary-color: #8ea670;     /* Soft matcha latte green */
      --text-color: #2c3531;          /* Elegant dark gray */
      --text-muted: #606f6b;          /* Supportive muted gray */
      --bg-color: #f7f9f6;            /* Overall app background */
      --card-bg: #ffffff;             /* Card background */
      --accent-correct: #4caf50;      /* Success Green */
      --accent-incorrect: #e53935;    /* Failure Red */
      --accent-warning: #ffb300;      /* Warning Orange */
      --border-radius: 12px;          /* Card rounded corners */
      --transition: all 0.3s ease;    /* Smooth hover transitions */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      padding: 20px 10px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* --------------------------------------------------
     * Layout Containers
     * -------------------------------------------------- */
    .app-container {
      width: 100%;
      max-width: 720px;
      background-color: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: 0 10px 25px rgba(46, 86, 63, 0.08);
      overflow: hidden;
      border: 1px solid rgba(46, 86, 63, 0.1);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .app-header {
      background-color: var(--primary-color);
      color: #ffffff;
      padding: 20px;
      text-align: center;
    }

    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* Progress Bar */
    .progress-container {
      background-color: #e0e6e2;
      height: 6px;
      width: 100%;
      position: relative;
    }

    .progress-bar {
      background-color: var(--secondary-color);
      height: 100%;
      width: 0%;
      transition: width 0.3s ease-in-out;
    }

    /* Main Body Area */
    .app-body {
      padding: 30px 24px;
      flex-grow: 1;
    }

    /* --------------------------------------------------
     * Quiz Screen Styles
     * -------------------------------------------------- */
    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .question-number {
      color: var(--primary-color);
      background-color: var(--primary-light);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .target-slide {
      color: var(--text-muted);
      font-size: 0.85rem;
      background-color: #f0f0f0;
      padding: 4px 12px;
      border-radius: 4px;
    }

    .question-text {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text-color);
      line-height: 1.5;
    }

    /* Options List */
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option-item {
      background-color: #ffffff;
      border: 2px solid #e0e6e2;
      border-radius: var(--border-radius);
      padding: 16px 20px;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-color);
      cursor: pointer;
      text-align: left;
      transition: var(--transition);
      display: flex;
      align-items: center;
      position: relative;
    }

    .option-item:hover {
      border-color: var(--secondary-color);
      background-color: var(--primary-light);
    }

    .option-item.selected {
      border-color: var(--primary-color);
      background-color: var(--primary-light);
      font-weight: 700;
    }

    /* Custom Radio-style Indicator */
    .option-item::before {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
      transition: var(--transition);
    }

    .option-item.selected::before {
      border-color: var(--primary-color);
      background-color: var(--primary-color);
      box-shadow: inset 0 0 0 4px var(--primary-light);
    }

    /* --------------------------------------------------
     * Navigation Buttons
     * -------------------------------------------------- */
    .navigation-area {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 24px;
    }

    .btn {
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
    }

    .btn-secondary {
      background-color: #e2e8f0;
      color: #475569;
    }

    .btn-secondary:hover:not(:disabled) {
      background-color: #cbd5e1;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: #ffffff;
      flex-grow: 1;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: #1f3b2b;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Alert Container Styling */
    .alert-container {
      margin-top: 16px;
      padding: 12px;
      background-color: #ffebee;
      border-left: 4px solid var(--accent-incorrect);
      border-radius: 4px;
      color: #c62828;
      font-weight: 600;
      font-size: 0.9rem;
      display: none; /* Hidden by default */
    }

    /* --------------------------------------------------
     * Result Screen Styles
     * -------------------------------------------------- */
    .result-section {
      display: none; /* Hidden by default */
    }

    .score-card {
      text-align: center;
      padding: 30px 20px;
      background-color: var(--primary-light);
      border-radius: var(--border-radius);
      margin-bottom: 30px;
      border: 1px dashed var(--secondary-color);
    }

    .score-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .score-number {
      font-size: 3rem;
      font-weight: 900;
      color: var(--primary-color);
      margin-bottom: 5px;
    }

    .score-percent {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .review-heading {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary-color);
      color: var(--primary-color);
    }

    /* Review Card List Styles */
    .review-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 30px;
    }

    .review-item {
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: var(--border-radius);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    .review-item.correct {
      border-left: 5px solid var(--accent-correct);
    }

    .review-item.incorrect {
      border-left: 5px solid var(--accent-incorrect);
    }

    .review-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 0.85rem;
    }

    .review-q-num {
      font-weight: 700;
    }

    .review-q-num.correct-text {
      color: var(--accent-correct);
    }

    .review-q-num.incorrect-text {
      color: var(--accent-incorrect);
    }

    .review-slide {
      color: var(--text-muted);
      background-color: #f1f5f9;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .review-question {
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .review-answer-comparison {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
      padding: 12px;
      background-color: #f8fafc;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    .user-ans-row {
      display: flex;
      align-items: flex-start;
    }

    .user-ans-row.wrong {
      color: var(--accent-incorrect);
      font-weight: 600;
    }

    .user-ans-row.correct {
      color: var(--accent-correct);
      font-weight: 600;
    }

    .correct-ans-row {
      display: flex;
      align-items: flex-start;
      color: var(--accent-correct);
      font-weight: 600;
    }

    .ans-label {
      width: 120px;
      flex-shrink: 0;
      color: var(--text-muted);
      font-weight: 500;
    }

    .review-explanation {
      background-color: var(--primary-light);
      border-radius: 8px;
      padding: 14px;
      font-size: 0.9rem;
      color: #334155;
      border: 1px solid rgba(46, 86, 63, 0.05);
    }

    .review-explanation strong {
      display: block;
      color: var(--primary-color);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .action-area {
      text-align: center;
      margin-top: 30px;
    }

    /* --------------------------------------------------
     * Responsive Design (Mobile Optimization)
     * -------------------------------------------------- */
    @media (max-width: 600px) {
      body {
        padding: 10px 5px;
      }

      .app-header {
        padding: 16px;
      }

      .app-header h1 {
        font-size: 1.25rem;
      }

      .app-body {
        padding: 20px 16px;
      }

      .question-text {
        font-size: 1.05rem;
        margin-bottom: 20px;
      }

      .option-item {
        padding: 14px 16px;
        font-size: 0.95rem;
      }

      .btn {
        padding: 12px 20px;
        font-size: 0.95rem;
        min-width: 100px;
      }

      .review-item {
        padding: 16px;
      }

      .review-question {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Header -->

        <!-- Warning Message Area -->

        </div>

        <div class="navigation-area">
          <button id="btn-prev" class="btn btn-secondary" onclick="prevQuestion()" disabled>Prev</button>
          <button id="btn-next" class="btn btn-primary" onclick="nextQuestion()">Next</button>
        </div>
      </section>

      <!-- Grading & Results Screen -->
      <section id="result-screen" class="result-section">
        <div class="score-card">
          <div class="score-title">Quiz Completed!</div>
          <div id="score-result" class="score-number">0 / 0</div>
          <div id="score-percent" class="score-percent">Accuracy: 0%</div>
        </div>

        <h2 class="review-heading">Review & Explanations</h2>
        
        <div id="review-list" class="review-list">
          <!-- Question reviews and detailed explanations will be generated dynamically -->
        </div>

        <div class="action-area">
          <button class="btn btn-primary" onclick="resetQuiz()">Try Again</button>
        </div>
      </section>

    </main>
  </div>

    const btnNext = document.getElementById('btn-next');
    
    const scoreResult = document.getElementById('score-result');
    const scorePercent = document.getElementById('score-percent');
    const reviewList = document.getElementById('review-list');

    // --------------------------------------------------
    // Quiz Initialization
    // --------------------------------------------------
    function initQuiz() {
      currentQuestionIndex = 0;
      userAnswers.fill(null);
      
      // Screen switches
      quizScreen.style.display = 'block';
      resultScreen.style.display = 'none';
      alertMessage.style.display = 'none';
      
      showQuestion(currentQuestionIndex);
    }

    // --------------------------------------------------
    // Display Question
    // --------------------------------------------------
    function showQuestion(index) {
      const currentQuiz = quizData.quiz[index];
      const totalQuestions = quizData.quiz.length;

      // Hide alert area
      alertMessage.style.display = 'none';

      // Update progress bar
      const progressPercent = ((index + 1) / totalQuestions) * 100;
      progressBar.style.width = `${progressPercent}%`;

      // Set titles and slide metadata
      questionNumberBadge.innerText = `Question ${index + 1} / ${totalQuestions}`;
      targetSlideBadge.innerText = currentQuiz.target_slide;
      questionText.innerText = currentQuiz.question;

      // Clear and regenerate option list
      optionsList.innerHTML = '';
      currentQuiz.options.forEach(option => {
        const optionButton = document.createElement('button');
        optionButton.className = 'option-item';
        optionButton.innerText = option;
        
        // Mark as selected if the user had already chosen this option
        if (userAnswers[index] === option) {
          optionButton.classList.add('selected');
        }

        // Selection event listener
        optionButton.onclick = () => selectOption(option);
        optionsList.appendChild(optionButton);
      });

      // Navigation button control
      // Prev Button: disabled on the very first question
      if (index === 0) {
        btnPrev.disabled = true;
      } else {
        btnPrev.disabled = false;
      }

      // Next Button: dynamically changes to "Submit Score" on the final question
      if (index === totalQuestions - 1) {
        btnNext.innerText = 'Submit Score';
      } else {
        btnNext.innerText = 'Next';
      }
    }

    // --------------------------------------------------
    // Handle Option Selection
    // --------------------------------------------------
    function selectOption(selectedOption) {
      // Save the selected answer
      userAnswers[currentQuestionIndex] = selectedOption;

      // Update styles of option elements
      const buttons = optionsList.querySelectorAll('.option-item');
      buttons.forEach(button => {
        if (button.innerText === selectedOption) {
          button.classList.add('selected');
        } else {
          button.classList.remove('selected');
        }
      });

      // Hide any warnings upon selection
      alertMessage.style.display = 'none';
    }

    // --------------------------------------------------
    // "Prev" Button Click Handler
    // --------------------------------------------------
    function prevQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        showQuestion(currentQuestionIndex);
      }
    }

    // --------------------------------------------------
    // "Next / Submit" Button Click Handler
    // --------------------------------------------------
    function nextQuestion() {
      const totalQuestions = quizData.quiz.length;

      // Final step trigger: entering grading flow
      if (currentQuestionIndex === totalQuestions - 1) {
        // Validate if all questions have been answered
        const hasUnanswered = userAnswers.some(ans => ans === null);
        if (hasUnanswered) {
          // Display the custom warning
          alertMessage.style.display = 'block';
          alertMessage.scrollIntoView({ behavior: 'smooth' });
          return;
        }
        submitQuiz();
        return;
      }

      // Regular "Next" transition
      currentQuestionIndex++;
      showQuestion(currentQuestionIndex);
    }

    // --------------------------------------------------
    // Scoring & Grading Flow
    // --------------------------------------------------
    function submitQuiz() {
      let correctCount = 0;
      const totalQuestions = quizData.quiz.length;

      // Reset review layout
      reviewList.innerHTML = '';

      quizData.quiz.forEach((q, idx) => {
        const userAns = userAnswers[idx];
        const isCorrect = userAns === q.answer;
        if (isCorrect) {
          correctCount++;
        }

        // Create the individual question review item
        const reviewItem = document.createElement('div');
        reviewItem.className = `review-item ${isCorrect ? 'correct' : 'incorrect'}`;

        reviewItem.innerHTML = `
          <div class="review-meta">
            <span class="review-q-num ${isCorrect ? 'correct-text' : 'incorrect-text'}">
              Question ${idx + 1}: ${isCorrect ? 'Correct (◯)' : 'Incorrect (×)'}
            </span>
            <span class="review-slide">${q.target_slide}</span>
          </div>
          <div class="review-question">${q.question}</div>
          <div class="review-answer-comparison">
            <div class="user-ans-row ${isCorrect ? 'correct' : 'wrong'}">
              <span class="ans-label">Your Answer:</span>
              <span>${userAns ? userAns : 'Unanswered'}</span>
            </div>
            ${!isCorrect ? `
            <div class="correct-ans-row">
              <span class="ans-label">Correct Answer:</span>
              <span>${q.answer}</span>
            </div>
            ` : ''}
          </div>
          <div class="review-explanation">
            <strong>Explanation:</strong>
            ${q.explanation}
          </div>
        `;
        reviewList.appendChild(reviewItem);
      });

      // Calculate accuracy percentage
      const percent = Math.round((correctCount / totalQuestions) * 100);

      // Render score outputs
      scoreResult.innerText = `${correctCount} / ${totalQuestions}`;
      scorePercent.innerText = `Accuracy: ${percent}%`;

      // Toggle screens
      quizScreen.style.display = 'none';
      resultScreen.style.display = 'block';

      // Scroll smoothly to top of the page
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --------------------------------------------------
    // Reset Quiz state
    // --------------------------------------------------
    function resetQuiz() {
      initQuiz();
    }

    // Execute setup on page load
    window.onload = function() {
      initQuiz();
    };
  </script>
</body>
</html>
